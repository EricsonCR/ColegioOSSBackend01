# ==============================
# Aplicación
# ==============================
spring.application.name=ColegioOSSBackend01
server.port=${PORT:8080}

# ==============================
# Datasource - PostgreSQL (Railway en prod, localhost en dev)
# ==============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/colegio_oss_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==============================
# Inicialización de datos (data.sql)
# ==============================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ==============================
# JWT
# ==============================
app.jwt.secret=${JWT_SECRET:CAMBIAR_ESTE_SECRETO_POR_UNO_SEGURO_EN_PRODUCCION}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:300000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ==============================
# CORS
# ==============================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ==============================
# Swagger / OpenAPI
# ==============================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}

# ==============================
# Jackson - Serialización JSON
# ==============================
spring.jackson.default-property-inclusion=non_null

# ==============================
# Correo - Gmail SMTP
# ==============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:tu_correo@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tu_contraseña_de_aplicacion}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==============================
# Frontend - URL para enlace de recuperación
# ==============================
app.frontend.reset-password-url=${FRONTEND_RESET_URL:http://localhost:3000/reset-password}

# ==============================
# Logging
# ==============================
logging.level.org.springframework.security=INFO
logging.level.upc.colegioossbackend01=DEBUG